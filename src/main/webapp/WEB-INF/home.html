<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            background: #ffffff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background-color: #2c3e50;
            color: #ffffff;
            padding: 20px;
            text-align: center;
            width: 100%;
        }

        header h1 {
            margin: 0;
        }

        .container-boxes {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            width: 100%;
        }

        .box {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            flex: 1;
            max-width: 250px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .box:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }

        .box h2 {
            margin-top: 0;
            font-size: 1.5em;
        }

        @media print {
            .container {
                box-shadow: none;
                border-radius: 0;
            }

            header,
            .footer {
                page-break-before: always;
                page-break-after: always;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Welcome to the Portal</h1>
        </header>
        <div class="container-boxes">
            <div class="box" onclick="window.location.href='student.html'">
                <h2>Student</h2>
            </div>
            <div class="box" onclick="window.location.href='faculty.html'">
                <h2>Faculty</h2>
            </div>
            <div class="box" onclick="window.location.href='admin.html'">
                <h2>Admin</h2>
            </div>
        </div>
    </div>
</body>

</html>

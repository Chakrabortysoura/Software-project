<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .log {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            margin: 20px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #2c3e50;
        }

        label {
            display: block;
            margin: 10px 0 5px;
            text-align: left;
            color: #2c3e50;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="tel"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            margin: 10px 0 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        input[type="submit"] {
            padding: 10px 20px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        input[type="submit"]:hover {
            background-color: #1a252f;
        }

        hr {
            border: none;
            height: 1px;
            background-color: #ddd;
            margin: 20px 0;
        }

        .signup-link {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .signup-link p {
            margin: 0;
            color: #2c3e50;
        }

        .signup-link a {
            margin-left: 5px;
            color: #2c3e50;
            text-decoration: none;
            font-weight: 700;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .registration {
            display: none;
        }

        .radio-group {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .radio-group input[type="radio"] {
            display: none;
        }

        .radio-group label {
            padding: 10px 20px;
            border: 2px solid #2c3e50;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .radio-group input[type="radio"]:checked + label {
            background-color: #2c3e50;
            color: white;
        }
    </style>
</head>
<body>
    <div class='log' id="login-section">
        <h2>Sign In</h2>
        <div class="radio-group">
            <input type="radio" id="student-signin" name="signin" value="student" checked>
            <label for="student-signin">Student</label>

            <input type="radio" id="faculty-signin" name="signin" value="faculty">
            <label for="faculty-signin">Faculty</label>
        </div>
        <form action="/signin" method="post">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" placeholder="Enter a valid username here" required>
            
            <label for="pass1">Password:</label>
            <input type="password" id="pass1" name="pass1" placeholder="Enter a strong password" required>
            
            <input type="submit" value="Sign In">
        </form>
        <hr>
        <div class="signup-link">
            <p>New User?</p>
        </div>
        <div class="radio-group">
            <input type="radio" id="student-signup" name="signup" value="student" checked>
            <label for="student-signup">Student Sign Up</label>

            <input type="radio" id="faculty-signup" name="signup" value="faculty">
            <label for="faculty-signup">Faculty Sign Up</label>
        </div>
        <a href="#" id="show-signup-form">Sign Up</a>
    </div>

    <div class='log registration' id="registration-section">
        <h2 id="registration-title">Student Registration</h2>
        <form action="/signup" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" required>
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
            
            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
            
            <label for="username">Username:</label>
            <input type="text" id="reg-username" name="username" placeholder="Enter a username" required>
            
            <label for="password">Password:</label>
            <input type="password" id="reg-password" name="password" placeholder="Enter a password" required>
            
            <div id="student-fields">
                <label for="student-id">Student ID:</label>
                <input type="text" id="student-id" name="student-id" placeholder="Enter your student ID" required>
                
                <label for="course">Course:</label>
                <input type="text" id="course" name="course" placeholder="Enter your course" required>
                
                <label for="year">Year:</label>
                <select id="year" name="year">
                    <option value="1">1st Year</option>
                    <option value="2">2nd Year</option>
                    <option value="3">3rd Year</option>
                    <option value="4">4th Year</option>
                </select>
            </div>
            
            <div id="faculty-fields" style="display: none;">
                <label for="faculty-id">Faculty ID:</label>
                <input type="text" id="faculty-id" name="faculty-id" placeholder="Enter your faculty ID" required>
                
                <label for="department">Department:</label>
                <input type="text" id="department" name="department" placeholder="Enter your department" required>
                
                <label for="designation">Designation:</label>
                <input type="text" id="designation" name="designation" placeholder="Enter your designation" required>
            </div>
            
            <input type="submit" value="Sign Up">
            <hr>
            <a href="#" id="back-to-login">Back to Login</a>
        </form>
    </div>

    <script>
        document.getElementById('show-signup-form').addEventListener('click', function() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('registration-section').style.display = 'block';

            if (document.getElementById('student-signup').checked) {
                document.getElementById('registration-title').textContent = 'Student Registration';
                document.getElementById('student-fields').style.display = 'block';
                document.getElementById('faculty-fields').style.display = 'none';
            } else if (document.getElementById('faculty-signup').checked) {
                document.getElementById('registration-title').textContent = 'Faculty Registration';
                document.getElementById('student-fields').style.display = 'none';
                document.getElementById('faculty-fields').style.display = 'block';
            }
        });

        document.getElementById('back-to-login').addEventListener('click', function() {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('registration-section').style.display = 'none';
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
/* styles.css */

body {
    font-family: 'Arial', sans-serif;
    background-color: #e9ecef;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 800px;
    margin: 50px auto;
    background: #ffffff;
    padding: 20px 40px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    border-radius: 10px;
}

h1 {
    text-align: center;
    color: #333;
    margin-bottom: 40px;
    font-size: 2em;
}

label {
    display: block;
    margin: 15px 0 5px;
    color: #333;
    font-weight: bold;
}

input[type="text"],
input[type="email"],
textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 1px solid #ccc;
    border-radius: 5px;
    box-sizing: border-box;
    font-size: 1em;
    background-color: #f9f9f9;
}

input[type="text"]:focus,
input[type="email"]:focus,
textarea:focus {
    border-color: #80bdff;
    outline: none;
    box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
}

textarea {
    resize: vertical;
    min-height: 100px;
}

button {
    display: block;
    width: 100%;
    padding: 15px;
    background-color: #007bff;
    color: #fff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 1.2em;
    margin-top: 20px;
}

button:hover {
    background-color: #0056b3;
}

.report {
    margin-top: 40px;
    padding: 20px;
    border: 1px solid #ddd;
    border-radius: 5px;
    background-color: #ffffff;
}

.report h2 {
    text-align: center;
    color: #333;
    margin-bottom: 20px;
}

.report p {
    margin: 10px 0;
    color: #555;
    line-height: 1.6;
}

    </style>
</head>
<body>
    <div class='log' id="login-section">
        <h2>Sign In</h2>
        <div class="radio-group">
            <input type="radio" id="student-signin" name="signin" value="student" onclick="typeselector()" checked>
            <label for="student-signin">Student</label>

            <input type="radio" id="faculty-signin" name="signin" value="faculty" onclick="typeselector()">
            <label for="faculty-signin">Faculty</label>
        </div>
        <form action="/signin" method="post">
            <label for="username" id="username-field">Batch:</label>
            <input type="text" id="username" name="username" placeholder="Enter a valid username here" required>

            <div id="password" style="display: none;">
                <label for="pass1">Password:</label>
                <input type="password" id="pass1" name="pass1" placeholder="Enter a strong password" required>
            </div>
            
            <input type="submit" value="Student" id="student-sign-in" formaction=""> <input type="submit" value="Teacher" id="faculty-sign-in" style="display: none;" formaction="">
        </form>
        <hr>
    </div>

    <script>
        function typeselector(){
            var type=document.getElementsByName('signin');
            var button1=document.getElementById('student-sign-in');
            var button2=document.getElementById('faculty-sign-in');
            var password_field=document.getElementById('password');
            if(type[0].checked){
                button2.style.display="none";
                button1.style.display="";
                password_field.style.display="none";
                document.getElementById("username-field").innerText="Batch";
            }
            else{
                button2.style.display="";
                button1.style.display="none";
                password_field.style.display="";
                document.getElementById("username-field").innerText="Username";
            }
        }
    </script>
</body>
</html>
